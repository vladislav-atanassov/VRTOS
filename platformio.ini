; --- BENCHMARKS ---
; Standalone executables that measure cycle-accurate timing of RTOS primitives.
; Each benchmark runs independently and reports min/max/avg over BENCH_ITERATIONS.
; Flash and open a serial monitor at 921600 baud to see results.
; Override iteration count: add -D BENCH_ITERATIONS=500 to build_flags.

[env:bench_context_switch]
build_src_filter = +<*> -<examples/> +<../tests/benchmarks/bench_context_switch/>
build_flags =
    ${env.build_flags}
    -I tests/benchmarks/
    -I tests/scheduler/
    -D RTOS_SCHEDULER_TYPE=RTOS_SCHEDULER_PREEMPTIVE_SP

[env:bench_mutex]
build_src_filter = +<*> -<examples/> +<../tests/benchmarks/bench_mutex/>
build_flags =
    ${env.build_flags}
    -I tests/benchmarks/
    -I tests/scheduler/
    -D RTOS_SCHEDULER_TYPE=RTOS_SCHEDULER_PREEMPTIVE_SP
    -D BENCH_ITERATIONS=100U
    -D BENCH_WARMUP=10U

[env:bench_queue]
build_src_filter = +<*> -<examples/> +<../tests/benchmarks/bench_queue/>
build_flags =
    ${env.build_flags}
    -I tests/benchmarks/
    -I tests/scheduler/
    -D RTOS_SCHEDULER_TYPE=RTOS_SCHEDULER_PREEMPTIVE_SP

[env:bench_semaphore]
build_src_filter = +<*> -<examples/> +<../tests/benchmarks/bench_semaphore/>
build_flags =
    ${env.build_flags}
    -I tests/benchmarks/
    -I tests/scheduler/
    -D RTOS_SCHEDULER_TYPE=RTOS_SCHEDULER_PREEMPTIVE_SP
    -D BENCH_ITERATIONS=5U
    -D BENCH_WARMUP=2U
